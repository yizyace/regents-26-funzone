<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regents Funzone</title>
<style>
  :root{
    --ink:#180f08;
    --paper:#fff8df;
    --gold:#ffd34d;
    --orange:#ff8f2f;
    --blue:#0e6f8f;
    --panel:rgba(255,255,255,.72);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,211,77,.7), transparent 28%),
      radial-gradient(circle at 80% 10%, rgba(14,111,143,.3), transparent 30%),
      linear-gradient(135deg, #fff3bd, #ffe0a3 48%, #ffd0b0);
    padding:24px;
  }
  main{
    width:min(920px,100%);
    background:var(--panel);
    border:3px solid rgba(24,15,8,.18);
    border-radius:28px;
    padding:clamp(28px,6vw,62px);
    box-shadow:0 24px 70px rgba(85,43,8,.22);
    position:relative;
    overflow:hidden;
  }
  main::before{
    content:'';
    position:absolute;
    inset:auto -10% -35% 35%;
    height:300px;
    background:repeating-linear-gradient(90deg, rgba(14,111,143,.16) 0 18px, transparent 18px 36px);
    transform:rotate(-8deg);
  }
  .eyebrow{
    color:var(--blue);
    font:700 13px/1.2 system-ui,sans-serif;
    letter-spacing:.18em;
    text-transform:uppercase;
  }
  h1{
    font-size:clamp(42px,9vw,92px);
    line-height:.9;
    margin:12px 0 18px;
    max-width:780px;
  }
  p{
    font-size:clamp(18px,2.2vw,23px);
    line-height:1.45;
    max-width:680px;
    margin:0 0 30px;
  }
  .actions{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    position:relative;
    z-index:1;
  }
  a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:58px;
    padding:0 24px;
    border-radius:999px;
    color:var(--ink);
    text-decoration:none;
    font:900 15px/1 system-ui,sans-serif;
    letter-spacing:.08em;
    text-transform:uppercase;
    border:2px solid rgba(24,15,8,.25);
    background:#fff;
    box-shadow:0 8px 0 rgba(24,15,8,.18);
    transition:transform .15s, box-shadow .15s;
  }
  a:hover{
    transform:translateY(-3px);
    box-shadow:0 11px 0 rgba(24,15,8,.18);
  }
  a.primary{
    background:linear-gradient(180deg,var(--gold),var(--orange));
  }
  .session{
    position:relative;
    z-index:1;
    margin-top:26px;
    padding-top:22px;
    border-top:2px dashed rgba(24,15,8,.18);
  }
  .session h2{
    margin:0 0 14px;
    font-size:clamp(22px,3.4vw,30px);
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
  }
  .session h2 .tag{
    font:700 12px/1 system-ui,sans-serif;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--blue);
  }
</style>
</head>
<body>
  <main>
    <div class="eyebrow">U.S. History &amp; Government Regents</div>
    <h1>Regents Funzone</h1>
    <p>Pick an exam, climb the money ladder in the quiz show, then drill the full deck with flashcards. Real exam documents — maps, posters, cartoons, and charts — are built into every question.</p>

    <div id="sessions"></div>
  </main>
  <script>
    // Each Regents administration is one entry. dir "" = the root deck; subdir sessions prefix their folder.
    const SESSIONS = [
      { dir: "",         title: "January 2026", tag: "28 MC · 37 cards" },
      { dir: "aug2025/", title: "August 2025",  tag: "28 MC · 37 cards" },
    ];
    document.getElementById("sessions").innerHTML = SESSIONS.map(s => `
    <section class="session">
      <h2>${s.title} <span class="tag">${s.tag}</span></h2>
      <div class="actions">
        <a class="primary" href="${s.dir}quizshow.html">Quiz Show</a>
        <a href="${s.dir}flashcards.html">Flashcards</a>
      </div>
    </section>`).join("");
  </script>
</body>
</html>
